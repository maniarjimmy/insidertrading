name: Insider Scanner — Daily Scan

permissions:
  contents: write

on:
  schedule:
    # Mon-Fri at 09:00 UTC = 2:30 PM IST
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SECRET_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run insider scan
        run: python main.py

      - name: Find latest HTML report
        id: find_report
        run: |
          REPORT=$(ls -t output/scan_*.html 2>/dev/null | head -1)
          echo "report_path=$REPORT" >> $GITHUB_OUTPUT
          echo "report_name=$(basename $REPORT)" >> $GITHUB_OUTPUT
          echo "Found report: $REPORT"

      - name: Email scan report
        if: steps.find_report.outputs.report_path != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: "📊 Insider Scan Report — ${{ github.event.repository.name }} — $(date -u +%Y-%m-%d)"
          body: |
            Hi,

            Today's insider activity scan has completed.
            Please find attached:
            - HTML scan report
            - Suspicious stocks master CSV (cumulative)
            - News-driven movers master CSV (cumulative)

            — Insider Scanner Bot 🤖
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.GMAIL_ADDRESS }}
          attachments: ${{ steps.find_report.outputs.report_path }},output/suspicious_master.csv,output/news_driven_master.csv

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-report-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Commit reports to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "📊 Scan report $(date -u +%Y-%m-%d)"
          git push
