name: Insider Scanner — Daily Scan

permissions:
  contents: write

on:
  schedule:
    # Mon-Fri at 09:00 UTC = 2:30 PM IST
    - cron: '0 9 * * 1-5'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run insider scan
        run: python main.py

      - name: Upload reports as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: scan-report-${{ github.run_id }}
          path: output/
          retention-days: 30

      - name: Commit reports to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "📊 Scan report $(date -u +%Y-%m-%d)"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref }}
